# U-Net Deforestation Detection Configuration

model:
  name: "unet_resnet50"
  in_channels: 12  # Bi-temporal Sentinel-2
  out_channels: 2  # Binary segmentation
  pretrained_encoder: true
  freeze_encoder_epochs: 5

training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 1.0e-4
  optimizer: "adam"
  loss_function: "cross_entropy_with_dice"
  loss_weights: [0.3, 0.7]  # Weight for non-deforested vs deforested

data:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  augmentation: true
  augmentation_params:
    rotation: 45
    flip: true
    brightness: 0.2
    contrast: 0.2

validation:
  early_stopping: true
  patience: 10
  monitor_metric: "val_iou"
  mode: "max"

checkpointing:
  save_best_only: true
  save_interval: 1
  checkpoint_dir: "models/"

logging:
  mlflow_enabled: true
  log_interval: 100
  tensorboard: true
  tensorboard_dir: "runs/unet"
